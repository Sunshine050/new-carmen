- keywords: ["vendor", "ap-vendor", "ผู้ขาย", "ร้านค้า"]
  patterns: ["%vendor%", "%ผู้ขาย%", "%ร้านค้า%"]

- keywords: ["configuration", "company profile", "chart of account", "department", "currency", "payment type", "permission", "cf-", "สิทธิ์ผู้ใช้", "กำหนดสิทธิ์"]
  patterns: ["%configuration%", "%cf-%"]

- keywords: [" ar ", "ar-", "ar invoice", "ar receipt", "ลูกค้า", "receipt", "contract", "folio", "ใบเสร็จ", "ลูกหนี้"]
  patterns: ["%ar-%", "%ar\\%", "%/ar/%"]

- keywords: [" ap ", "ap-", "ap invoice", "ap payment", "เจ้าหนี้", "cheque", "wht", "หัก ณ ที่จ่าย", "input tax", "ภาษีซื้อ"]
  patterns: ["%ap-%", "%ap\\%", "%/ap/%"]

- keywords: ["asset", "สินทรัพย์", "as-", "ทะเบียนสินทรัพย์", "asset register", "asset disposal"]
  patterns: ["%as-%", "%asset%"]

- keywords: [" gl ", "gl ", "general ledger", "journal voucher", "voucher", "บัญชีแยกประเภท", "ผังบัญชี", "allocation", "amortization", "budget", "recurring"]
  patterns: ["%gl%", "%c-%"]

- keywords: ["dashboard", "สถิติ", "revenue", "occupancy", "adr", "revpar", "trevpar", "p&l", "กำไรขาดทุน"]
  patterns: ["%dashboard%"]

- keywords: ["workbook", "excel", "refresh", "formula", "function", "add-in"]
  patterns: ["%workbook%", "%wb-%", "%excel%"]

- keywords: ["comment", "activity log", "document management", "ไฟล์แนบ", "รูปภาพแนบ", "ประวัติเอกสาร", "คอมเมนต์", "ความคิดเห็น"]
  patterns: ["%comment%", "%cm-%"]
