# render.yaml — New Carmen: Render deployment blueprint
#
# Architecture:
#   carmen-db       → Render Managed PostgreSQL 16 (pgvector via migration 0001)
#   carmen-chatbot  → Python 3.12 / FastAPI
#   carmen-backend  → Go 1.21 / Fiber
#
# Frontend (Next.js) → Vercel (see frontend/user/vercel.json)
#
# ─── First-time setup ─────────────────────────────────────────────────────────
# 1. Push this file to GitHub, then connect repo on Render → "New Blueprint"
# 2. Set all env vars marked "sync: false" in the Render dashboard:
#      JWT_SECRET               → openssl rand -hex 32
#      PRIVACY_HMAC_SECRET      → openssl rand -hex 32  (same value on both services) #      GITHUB_TOKEN             → GitHub PAT (repo:read scope)
#      OPENROUTER_API_KEY       → your OpenRouter key
#      GOOGLE_TRANSLATE_API_KEY → optional; leave empty if TRANSLATION_ENABLED=false
# 3. Migrations run automatically via preDeployCommand on every backend deploy.
#    If you need to run them manually: Render dashboard → carmen-backend → Shell
#      $ ./server migrate
# 4. After first deploy, set CORS_ORIGINS on both services and
#    NEXT_PUBLIC_API_BASE on Vercel to the real URLs (see notes below).
# ──────────────────────────────────────────────────────────────────────────────

databases:
  - name: carmen-db
    databaseName: carmen_db
    user: postgres
    plan: starter               # $7/mo — cheapest plan that supports pgvector
    postgresMajorVersion: "16"  # matches pgvector/pgvector:pg16 in docker-compose

services:
  # ─── Python Chatbot (FastAPI + LangChain) ─────────────────────────────────
  - type: web
    name: carmen-chatbot
    runtime: python
    rootDir: carmen-chatbot
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: ENVIRONMENT
        value: production

      # ── Database (from Render managed DB) ──────────────────────────────────
      - key: DB_HOST
        fromDatabase:
          name: carmen-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: carmen-db
          property: port
      - key: DB_USER
        fromDatabase:
          name: carmen-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: carmen-db
          property: password
      - key: DB_NAME
        fromDatabase:
          name: carmen-db
          property: database
      - key: DB_SSLMODE
        value: require

      # ── Wiki content ─────────────────────────────────────────────────────
      # Render clones the full repo to /opt/render/project/src regardless of rootDir
      - key: WIKI_CONTENT_PATH
        value: /opt/render/project/src/carmen_cloud

      - key: VECTOR_DIMENSION
        value: "1536"

      # ── LLM ──────────────────────────────────────────────────────────────
      - key: LLM_API_BASE
        value: https://openrouter.ai/api/v1
      - key: LLM_CHAT_MODEL
        value: stepfun/step-3.5-flash:free
      - key: LLM_INTENT_MODEL
        value: google/gemini-2.5-flash-lite
      - key: LLM_EMBED_MODEL
        value: qwen/qwen3-embedding-8b
      - key: LLM_API_KEY
        sync: false   # set OPENROUTER_API_KEY in Render dashboard

      # ── Security ─────────────────────────────────────────────────────────
      - key: PRIVACY_HMAC_SECRET
        sync: false   # openssl rand -hex 32 — must match backend value

      # ── CORS ─────────────────────────────────────────────────────────────
      # TODO: after first Vercel deploy, change to https://your-app.vercel.app
      - key: CORS_ORIGINS
        value: "*"

      # ── Inter-service ─────────────────────────────────────────────────────
      - key: GO_BACKEND_URL
        fromService:
          type: web
          name: carmen-backend
          envVarKey: RENDER_EXTERNAL_URL

  # ─── Go Backend (Fiber API) ───────────────────────────────────────────────
  - type: web
    name: carmen-backend
    runtime: go
    rootDir: backend
    plan: starter
    buildCommand: go build -o server ./cmd/server
    # Runs migrations idempotently before each new deployment starts.
    # Safe to re-run: all SQL uses IF NOT EXISTS / CREATE OR REPLACE.
    preDeployCommand: ./server migrate
    startCommand: ./server
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production

      # ── Database ───────────────────────────────────────────────────────────
      - key: DB_HOST
        fromDatabase:
          name: carmen-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: carmen-db
          property: port
      - key: DB_USER
        fromDatabase:
          name: carmen-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: carmen-db
          property: password
      - key: DB_NAME
        fromDatabase:
          name: carmen-db
          property: database
      - key: DB_SSLMODE
        value: require
      - key: DB_SCHEMA
        value: carmen,public

      # ── Wiki / Git ─────────────────────────────────────────────────────────
      - key: GIT_REPO_PATH
        value: /opt/render/project/src
      - key: WIKI_CONTENT_PATH
        value: /opt/render/project/src/carmen_cloud
      - key: GITHUB_REPO_OWNER
        value: Sunshine050
      - key: GITHUB_REPO_NAME
        value: new-carmen
      - key: GITHUB_BRANCH
        value: main
      - key: GITHUB_TOKEN
        sync: false   # GitHub PAT (repo:read)

      # ── LLM / Embeddings ───────────────────────────────────────────────────
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_EMBED_MODEL
        value: qwen/qwen3-embedding-8b

      # ── Translation ────────────────────────────────────────────────────────
      - key: TRANSLATION_ENABLED
        value: "false"
      - key: GOOGLE_TRANSLATE_API_KEY
        sync: false   # optional; set only if TRANSLATION_ENABLED=true

      # ── Security ───────────────────────────────────────────────────────────
      - key: JWT_SECRET
        sync: false   # openssl rand -hex 32
      - key: PRIVACY_HMAC_SECRET
        sync: false   # openssl rand -hex 32 — must match chatbot value

      # ── CORS ───────────────────────────────────────────────────────────────
      # TODO: after first Vercel deploy, change to https://your-app.vercel.app
      - key: CORS_ORIGINS
        value: "*"

      # ── Inter-service ──────────────────────────────────────────────────────
      - key: PYTHON_CHATBOT_URL
        fromService:
          type: web
          name: carmen-chatbot
          envVarKey: RENDER_EXTERNAL_URL
